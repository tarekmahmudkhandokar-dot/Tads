<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PP Coin - Reward</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a0033;
      color: white;
      height: 100vh;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #0f0022;
      padding: 14px 20px;
      text-align: center;
      font-size: 15px;
      z-index: 100;
      border-bottom: 1px solid #4b0082;
    }
    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      padding-top: 80px;
    }
    .reward-box {
      background: rgba(30, 0, 60, 0.95);
      border: 2px solid #8a2be2;
      border-radius: 18px;
      padding: 35px 25px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3);
    }
    h1 {
      font-size: 23px;
      margin-bottom: 12px;
      color: #d8b4ff;
    }
    p {
      font-size: 16.5px;
      margin-bottom: 25px;
      color: #c8b4ff;
      line-height: 1.4;
    }
    .timer {
      font-size: 18px;
      font-weight: bold;
      color: #ffd700;
      margin: 20px 0;
    }
    button {
      margin-top: 10px;
      padding: 16px 50px;
      font-size: 18px;
      font-weight: bold;
      background: linear-gradient(45deg, #8a2be2, #ba55d3);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 6px 15px rgba(138, 43, 226, 0.4);
    }
    button:disabled {
      background: #4a2a6b;
      color: #aaa;
    }
    .warning {
      background: #c62828;
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      margin: 25px 0 10px;
      font-size: 14.5px;
      font-weight: bold;
    }
    .click-anywhere {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <strong>Ads By Adzentra Ads</strong>
  </div>

  <div class="click-anywhere" id="clickArea"></div>

  <div class="container">
    <div class="reward-box">
      <h1>You are very close to your reward!</h1>
      <p>Tap anywhere on the screen to claim your reward instantly.</p>
      
      <div class="timer" id="timerText">Please wait <span id="count">10</span> seconds...</div>
      
      <button id="continueBtn" disabled>Continue</button>
      
      <div class="warning">
        ⚠️ NO WEBSITE VISIT = NO REWARD ⚠️<br>
        Don't close the page until reward loads!
      </div>
    </div>
  </div>

  <!-- RichAds Scripts -->
  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
  
  <script>
    let adLoaded = false;

    function tryInitializeAd(appId) {
      if (adLoaded) return;
      try {
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
          pubId: "987925",
          appId: appId,
        });
      } catch(e) {}
    }

    window.onload = function() {
      tryInitializeAd("7754");
      setTimeout(() => tryInitializeAd("3767"), 2200);
      setTimeout(() => tryInitializeAd("5127"), 4500);

      let timeLeft = 10;
      const countEl = document.getElementById('count');
      const timerText = document.getElementById('timerText');
      const btn = document.getElementById('continueBtn');
      const clickArea = document.getElementById('clickArea');

      const timer = setInterval(() => {
        timeLeft--;
        countEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          timerText.style.display = "none";   // সময় শেষ হলে টেক্সট লুকাবে
          btn.disabled = false;
          clickArea.style.pointerEvents = "auto";
        }
      }, 1000);

      function triggerAd() {
        if (window.TelegramAdsController) {
          console.log("RichAds Original Ad Triggered");
        }
        // Original RichAds ad will show here
        alert("Opening Original RichAds Notification...");
      }

      clickArea.addEventListener('click', triggerAd);
      btn.addEventListener('click', triggerAd);
    };
  </script>

</body>
</html>
