<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PP Coin - Reward</title>

  <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

  <style>
    body{
      background:#0f0022;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:Segoe UI,sans-serif;
    }
    .box{
      text-align:center;
      background:#1a0033;
      padding:30px;
      border-radius:20px;
      border:1px solid #4b0082;
      width:90%;
      max-width:400px;
    }
    button{
      width:100%;
      padding:16px;
      font-size:18px;
      border:none;
      border-radius:12px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
    <h2>You are close to your reward!</h2>
    <p>Just click Continue.</p>

    <button id="btn">
        Continue
    </button>
</div>

<script>

const pubId="987925";

const appIds=[
    "7754",
    "3767",
    "5127"
];

let tgAds=null;

function initAds(index){

    if(index>=appIds.length){
        console.log("No App ID available.");
        return;
    }

    try{

        tgAds=new TelegramAdsController();

        tgAds.initialize({
            pubId:pubId,
            appId:appIds[index]
        });

        console.log("Initialized:",appIds[index]);

    }catch(e){

        console.log("Failed:",appIds[index]);

        initAds(index+1);

    }

}

initAds(0);

document.getElementById("btn").onclick=function(){

    if(!tgAds){
        alert("Ads not ready.");
        return;
    }

    try{

        if(typeof tgAds.triggerNativeNotification==="function"){

            tgAds.triggerNativeNotification();

        }else{

            alert("Native Push Notification is not supported for this App ID.");

        }

    }catch(e){

        console.error(e);

    }

};

</script>

</body>
</html>
