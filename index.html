<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PP Coin App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Telega.io SDK -->
<script src="https://inapp.telega.io/sdk/v1/sdk.js"></script>

<!-- AdExtra -->
<script async src="https://partner.adextra.io/jt/fbcbc5db7d4d1a01fa6db0b51a1c936e815b1c23.js"></script>
<script async src="https://partner.adextra.io/jt/c1d6dbfa330a0f130ae43b4de0d12a76a415ebb0.js"></script>

<style>
    body { 
        margin: 0; 
        font-family: Arial, sans-serif; 
        background: #0f172a; 
        color: white; 
        text-align: center;
    }
    .page { display: none; padding: 20px; min-height: 100vh; }
    .active { display: block; }

    button {
        background: #22c55e;
        border: none;
        padding: 14px 20px;
        margin: 10px 0;
        border-radius: 12px;
        color: white;
        font-size: 16px;
        width: 90%;
        font-weight: bold;
    }
    .task-btn { background: #3b82f6; }

    .nav {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #111827;
        display: flex;
        justify-content: space-around;
        padding: 10px 0;
        border-top: 1px solid #334155;
    }
</style>
</head>

<body>

<!-- ================= HOME PAGE ================= -->
<div id="home" class="page active">
    <h2>💰 PP Coin Station</h2>
    <p id="name">Loading...</p>
    <p id="userid"></p>
    <p>Coin: <span id="coin-home">0</span></p>
    <button onclick="showAdExtra()">🚀 Watch Ad (+5 Coins)</button>
</div>

<!-- ================= TASK PAGE ================= -->
<div id="task" class="page">
    <h2>🎯 Complete Tasks & Earn</h2>
    <p>Your Coin: <span id="coin-task">0</span></p>

    <div class="space-y-4 mt-6">
        <button onclick="showTelegaAd('fullscreen')" class="task-btn">
            📺 Fullscreen Ad (+50 Coins)
        </button>

        <button onclick="showTelegaAd('interstitial')" class="task-btn">
            🎬 Interstitial Ad (+50 Coins)
        </button>

        <button onclick="showTelegaAd('rewarded')" class="task-btn">
            🎁 Rewarded Ad (+50 Coins)
        </button>

        <button id="rewards-button">🌟 Open Offerwall</button>
    </div>
</div>

<!-- ================= NAVIGATION ================= -->
<div class="nav">
    <button onclick="openPage('home')">🏠 Home</button>
    <button onclick="openPage('task')">📋 Tasks</button>
</div>

<script>
// ================= Telegram WebApp =================
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
if (user) {
    document.getElementById("name").innerText = user.first_name || "User";
    document.getElementById("userid").innerText = "ID: " + user.id;
}

// ================= Local Storage & Coins =================
let userId = localStorage.getItem("userId") || "user_" + Math.floor(Math.random() * 1000000);
localStorage.setItem("userId", userId);

let userCoins = parseInt(localStorage.getItem("coins")) || 0;

function saveCoins() {
    localStorage.setItem("coins", userCoins);
    updateUI();
}

function updateUI() {
    document.getElementById("coin-home").innerText = userCoins;
    document.getElementById("coin-task").innerText = userCoins;
}

// ================= Telega.io Ads =================
const ads = window.TelegaIn.AdsController.create_miniapp({
    token: '3cead624-45a4-4bf8-8825-1253a9c87981'
});

function showTelegaAd(type) {
    ads.ad_show({
        adBlockUuid: "d7ba3cee-ae84-4c68-9713-57912b25f5c4",
        onClose: () => console.log("Ad closed"),
        onReward: () => {
            userCoins += 50;
            saveCoins();
            alert("🎉 +50 PP Coins Added!");
        },
        onError: (err) => {
            console.error("Ad Error:", err);
            alert("⚠️ Ad not available right now.");
        }
    });
}

// ================= AdExtra =================
function showAdExtra() {
    if (typeof p_adextra === "function") {
        p_adextra(() => {
            userCoins += 5;
            saveCoins();
            alert("✅ Ad watched! +5 Coins");
        }, () => {
            alert("❌ Ad failed or closed");
        });
    } else {
        alert("Ad not ready yet");
    }
}

// ================= GigaPub Offerwall =================
document.addEventListener('DOMContentLoaded', function() {
    if (!window.loadOfferWallSDK) {
        const script = document.createElement('script');
        script.src = 'https://wall.giga.pub/api/v1/loader.js?projectId=3256';
        script.async = true;
        document.head.appendChild(script);
    }
});

(window.loadGigaSDKCallbacks || (window.loadGigaSDKCallbacks = [])).push(() => {
    window.loadOfferWallSDK({
        projectId: '3256',
        userId: userId
    })
    .then(sdk => {
        window.gigaOfferWallSDK = sdk;
        sdk.on('rewardClaim', async (data) => {
            userCoins += 10;
            saveCoins();
            alert("🎉 Task Completed! +10 Coins");
            await sdk.confirmReward(data.rewardId, data.hash);
        });
    })
    .catch(error => console.error("Offerwall Error:", error));
});

document.getElementById("rewards-button").addEventListener("click", () => {
    if (window.gigaOfferWallSDK) {
        window.gigaOfferWallSDK.open();
    } else {
        alert("Offerwall is loading... Please wait");
    }
});

// ================= Navigation =================
function openPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

// ================= Init =================
updateUI();

</script>

</body>
</html>
