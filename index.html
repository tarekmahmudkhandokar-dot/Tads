<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PP Coin App</title>

<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
<script>
  window.TelegramAdsController = new TelegramAdsController();
  window.TelegramAdsController.initialize({ pubId: "987925", appId: "3767" });
</script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body { margin: 0; font-family: Arial; background: #0f172a; color: white; text-align: center; }

.page { display: none; padding: 20px; }
.active { display: block; }

button {
    background: #22c55e;
    border: none;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 10px;
    color: white;
    font-size: 16px;
}

.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    display: flex;
    justify-content: space-around;
    padding: 10px;
}
</style>
</head>

<body>

<!-- ================= HOME PAGE ================= -->
<div id="home" class="page active">
<h2>💰 PP Coin Station</h2>
<p id="name">Loading...</p>
<p id="userid"></p>
<p>Coin: <span id="coin-home">0</span></p>
<button onclick="showWatchAd()">🚀 Watch Ad</button>
</div>

<!-- ================= TASK PAGE ================= -->
<div id="task" class="page">
<h2>🎯 Complete Tasks & Earn</h2>
<p>Your Coin: <span id="coin-task">0</span></p>
<button id="rewards-button">Open Offerwall</button>
</div>

<!-- ================= NAVIGATION ================= -->
<div class="nav">
<button onclick="openPage('home')">🏠 Home</button>
<button onclick="openPage('task')">📋 Task</button>
</div>

<script>

// ================= TELEGRAM WEB APP =================
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// ================= LOCAL STORAGE =================
let userId = localStorage.getItem("userId") || "user_" + Math.floor(Math.random() * 1000000);
localStorage.setItem("userId", userId);

let userCoins = parseInt(localStorage.getItem("coins")) || 0;

function saveCoins() {
    localStorage.setItem("coins", userCoins);
    updateUI();
}

function updateUI() {
    document.getElementById("coin-home").innerText = userCoins;
    document.getElementById("coin-task").innerText = userCoins;
}

// ================= TELEGRAM USER =================
const user = tg.initDataUnsafe?.user;
if (user) {
    document.getElementById("name").innerText = user.first_name || "User";
    document.getElementById("userid").innerText = "ID: " + user.id;
}

// ================= NAVIGATION =================
function openPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

// ================= Watch Ad - Open Inside Telegram Mini App =================
function showWatchAd() {
    // Telegram Mini App এর ভিতরে নতুন পেজ ওপেন
    tg.openLink("https://t.me/QUICK_REACTIONBOT/ads", {
        try_instant_view: true
    });
}

// ================= Offerwall Load & Init (আগের মতো রাখা হয়েছে) =================
document.addEventListener('DOMContentLoaded', function() {
  if (!window.loadOfferWallSDK) {
    const script = document.createElement('script');
    script.src = 'https://wall.giga.pub/api/v1/loader.js?projectId=3256';
    script.async = true;
    document.head.appendChild(script);
  }
});

(window.loadGigaSDKCallbacks || (window.loadGigaSDKCallbacks = [])).push(() => {
  window.loadOfferWallSDK({ projectId: '3256', userId: userId })
    .then(sdk => {
      window.gigaOfferWallSDK = sdk;
      sdk.on('rewardClaim', async (data) => {
        userCoins += 10;
        saveCoins();
        alert("🎉 Task Completed! +10 coins");
        await sdk.confirmReward(data.rewardId, data.hash);
      });
    })
    .catch(error => console.log(error));
});

document.getElementById("rewards-button").addEventListener("click", () => {
  if (window.gigaOfferWallSDK) {
    window.gigaOfferWallSDK.open();
  } else {
    alert("Offerwall not ready");
  }
});

// INIT UI
updateUI();

</script>

</body>
</html>
