<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TAds Ads Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- TAds Official Script with check -->
<script>
(function () {
  var s = document.createElement("script");
  s.src = "https://js.tads.me/widget.js";
  s.async = true;

  s.onload = function () {
    console.log("✅ TAds script loaded");
    document.getElementById("ad-status").innerHTML = "✅ TAds Script Loaded";
  };

  s.onerror = function () {
    console.error("❌ TAds script failed");
    document.getElementById("ad-status").innerHTML =
      "❌ TAds Script Not Loaded (Telegram may block it)";
  };

  document.head.appendChild(s);
})();
</script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
.box {
  background:#020617;
  border-radius:12px;
  padding:15px;
  margin-top:20px;
}
.status {
  margin-top:10px;
  font-size:14px;
  opacity:.85;
}
</style>
</head>

<body>

<h2>🚀 TAds Ads Test</h2>
<p>Original TAds ads only</p>

<div id="ad-status" class="status">⏳ Loading TAds script...</div>

<!-- FULLSCREEN / MAIN AD -->
<div class="tads-widget"
     data-publisher="d7fe9c59"
     data-widget="9404">
</div>

<div class="box">
  <p>⬇️ TGB Banner ⬇️</p>

  <!-- BANNER AD -->
  <div class="tads-widget"
       data-publisher="d7fe9c59"
       data-widget="9405">
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
    console.log("📲 Telegram WebApp detected");
  }
});
</script>

</body>
</html>
